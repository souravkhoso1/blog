<header class="site-header">
  <div class="container">
    <a class="site-logo" href="{{ '/' | relative_url }}">
      <span class="logo-accent">✦</span> {{ site.title }}
    </a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Posts</a>
      <a href="{{ '/about' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>About</a>
    </nav>
  </div>
</header>
